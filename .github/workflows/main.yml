name: Deploy Next.js App to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.VPS_KEY }}

      - name: Deploy to VPS
        run: |
          ssh -T -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash << 'EOSCRIPT'
            set -e

            echo "➡ Entered the server"

            echo "➡ Frontend deployment starting..."
            cd /var/www/Saas_AutoPublisher/frontend/Saas_AutoPublisher_Frontend

            echo "📦 Pulling latest frontend code..."
            git reset --hard
            git clean -fd
            git pull origin main

            echo "📦 Installing frontend dependencies..."
            rm -rf node_modules package-lock.json
            npm install --legacy-peer-deps

            echo "🔨 Building frontend..."
            npm run build

            echo "🚀 Restarting frontend with PM2..."
            pm2 restart saas-frontend || pm2 start npm --name saas-frontend -- start

            echo "✅ Frontend deployment complete!"

            echo "➡ Backend deployment starting..."
            cd /var/www/Saas_AutoPublisher/backend

            echo "📦 Pulling latest backend code..."
            git reset --hard
            git clean -fd
            git pull origin main

            echo "🐍 Setting up virtual environment..."
            python3 -m venv venv
            source venv/bin/activate

            echo "📦 Installing backend dependencies..."
            pip install --upgrade pip
            pip install -r requirements.txt

            echo "🚀 Restarting backend with PM2..."
            pm2 restart saas-api || pm2 start venv/bin/python --name saas-api -- main.py

            echo "✅ Backend deployment complete!"

            echo "🔁 Reloading NGINX..."
            sudo systemctl reload nginx || sudo systemctl restart nginx

            echo "✅ All deployment steps completed!"
          EOSCRIPT
